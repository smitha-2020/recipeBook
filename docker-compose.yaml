# To reset MongoDB to empty and re-run all migrations: docker compose down -v && docker compose up -d
services:
  backend:
    build: .
    ports:
      - 3000:3000
    depends_on:
      - db
    environment:
      DB_URL: mongodb://db/recipeBook
      NODE_ENV: production
      DB_NAME: recipeBook
      # Detect code changes when ./ is mounted (required on Docker Desktop Mac/Windows)
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/app
    command: ./docker-entrypoint.sh

  db:
    image: mongodb/mongodb-community-server:latest
    ports:
      - 27017:27017
    volumes:
      - recipesList:/data/db

volumes:
  recipesList:
